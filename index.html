<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Master - Бросок кубика 🎲</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #1a0f07;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #f5f5dc;
      text-align: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Тёмный фон с текстурой дерева */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("./assets/wood.jpg") no-repeat center center fixed;
      background-size: cover;
      opacity: 0.15;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 2;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Название кубика */
    .dice-title {
      font-size: 1.6rem;
      color: #d4a574;
      text-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
      letter-spacing: 2px;
      font-weight: normal;
    }

    /* Контейнер для картинки/видео */
    .dice-display {
      width: 260px;
      height: 260px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(212, 165, 116, 0.15);
      background: rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }

    .dice-display.rolling {
      transform: scale(1.02);
      box-shadow:
        0 0 60px rgba(0, 0, 0, 0.6),
        0 0 100px rgba(212, 165, 116, 0.25);
    }

    /* Превью-изображение */
    .dice-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 24px;
    }

    /* Видео (скрыто по умолчанию) */
    .dice-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 24px;
      background: #000;
    }

    /* Лоадер */
    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(212, 165, 116, 0.2);
      border-top-color: #d4a574;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Результат броска */
    .roll-result {
      font-size: 4rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow:
        0 0 20px rgba(255, 215, 0, 0.6),
        0 0 40px rgba(255, 215, 0, 0.3),
        0 2px 10px rgba(0, 0, 0, 0.8);
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      opacity: 0;
    }

    .roll-result.visible {
      opacity: 1;
    }

    /* Кнопка броска */
    .roll-button {
      background: linear-gradient(180deg, #c8963e 0%, #8b5e2b 100%);
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      color: #fff;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .roll-button:active {
      transform: translateY(2px);
      box-shadow:
        0 3px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .roll-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Сообщение с типом кубика */
    .dice-info {
      font-size: 0.9rem;
      color: rgba(245, 245, 220, 0.5);
      letter-spacing: 1px;
    }

    /* Адаптивка для маленьких экранов */
    @media (max-width: 360px) {
      .dice-display {
        width: 220px;
        height: 220px;
      }
      .roll-result {
        font-size: 3rem;
        min-height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dice-info" id="diceInfo">D20</div>

    <!-- Дисплей кубика -->
    <div class="dice-display" id="diceDisplay">
      <img
        id="dicePreview"
        class="dice-preview"
        src="./assets/previews/d20.png"
        alt="D20"
      >
      <video
        id="diceVideo"
        class="dice-video"
        playsinline
        preload="auto"
        disableRemotePlayback
        x-webkit-airplay="deny"
      ></video>
      <div class="loading-indicator" id="loadingIndicator">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Результат -->
    <div class="roll-result" id="rollResult"></div>

    <!-- Кнопка -->
    <button class="roll-button" id="rollButton">
      🎲 Бросить кубик
    </button>
  </div>

  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.BackButton.hide();
      tg.disableVerticalSwipes();

      // ==================== КОНФИГУРАЦИЯ КУБИКОВ ====================
      // Чтобы добавить новый кубик, просто добавь запись сюда
      const DICE_CONFIG = {
        d4:  { sides: 4,  preview: './assets/previews/d4.png',  label: 'D4' },
        d6:  { sides: 6,  preview: './assets/previews/d6.png',  label: 'D6' },
        d8:  { sides: 8,  preview: './assets/previews/d8.png',  label: 'D8' },
        d10: { sides: 10, preview: './assets/previews/d10.png', label: 'D10' },
        d12: { sides: 12, preview: './assets/previews/d12.png', label: 'D12' },
        d20: { sides: 20, preview: './assets/previews/d20.png', label: 'D20' }
      };

      const VIDEO_BASE_PATH = './assets/videos';

      // ==================== DOM ЭЛЕМЕНТЫ ====================
      const diceDisplay = document.getElementById('diceDisplay');
      const dicePreview = document.getElementById('dicePreview');
      const diceVideo = document.getElementById('diceVideo');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const rollResult = document.getElementById('rollResult');
      const rollButton = document.getElementById('rollButton');
      const diceInfo = document.getElementById('diceInfo');

      // ==================== СОСТОЯНИЕ ====================
      const urlParams = new URLSearchParams(window.location.search);
      const currentDiceType = urlParams.get('dice') || 'd20';
      const currentDiceConfig = DICE_CONFIG[currentDiceType] || DICE_CONFIG.d20;

      let isRolling = false;
      let lastResult = null;
      let videoPreloaded = {}; // Кеш предзагруженных URL

      // ==================== ИНИЦИАЛИЗАЦИЯ ====================
      function init() {
        // Устанавливаем превью и название
        dicePreview.src = currentDiceConfig.preview;
        diceInfo.textContent = currentDiceConfig.label;

        // Предзагружаем самые вероятные результаты (1, 20 и соседи)
        preloadCommonVideos();

        console.log(`🎲 Game Master: ${currentDiceConfig.label} готов к броску`);
      }

      // ==================== ПРЕДЗАГРУЗКА ВИДЕО ====================
      function preloadCommonVideos() {
        const sides = currentDiceConfig.sides;
        // Предзагружаем: 1, max, и ещё пару случайных
        const valuesToPreload = [1, sides, Math.floor(sides / 2), Math.floor(sides * 0.75)];

        valuesToPreload.forEach(value => {
          const url = getVideoUrl(value);
          preloadVideo(url);
        });
      }

      function preloadVideo(url) {
        if (videoPreloaded[url]) return;

        // Используем fetch для предзагрузки в кеш браузера
        fetch(url, { mode: 'cors', cache: 'force-cache' })
          .then(response => {
            if (response.ok) {
              videoPreloaded[url] = true;
              console.log(`📦 Предзагружено: ${url}`);
            }
          })
          .catch(() => {
            // Не страшно, если не получилось — загрузится при броске
          });
      }

      function getVideoUrl(value) {
        return `${VIDEO_BASE_PATH}/${currentDiceType}/${value}.mp4`;
      }

      // ==================== БРОСОК ====================
      function performRoll() {
        if (isRolling) return;

        isRolling = true;
        rollButton.disabled = true;
        diceDisplay.classList.add('rolling');

        // Генерируем результат
        const result = Math.floor(Math.random() * currentDiceConfig.sides) + 1;
        lastResult = result;

        // Скрываем предыдущий результат и картинку
        rollResult.classList.remove('visible');
        rollResult.textContent = '';

        // Показываем лоадер
        loadingIndicator.style.display = 'block';
        dicePreview.style.display = 'block';
        diceVideo.style.display = 'none';

        const videoUrl = getVideoUrl(result);
        console.log(`🎲 Бросок ${currentDiceConfig.label}: ${result} → ${videoUrl}`);

        // Загружаем видео
        diceVideo.src = videoUrl;

        // Флаг для предотвращения двойного срабатывания
        let videoStarted = false;

        const onCanPlay = () => {
          if (videoStarted) return;
          videoStarted = true;

          // Скрываем лоадер и превью, показываем видео
          loadingIndicator.style.display = 'none';
          dicePreview.style.display = 'none';
          diceVideo.style.display = 'block';

          // Запускаем воспроизведение
          const playPromise = diceVideo.play();

          if (playPromise) {
            playPromise.catch(err => {
              console.warn('⚠️ Автовоспроизведение заблокировано:', err.message);
              // Показываем кнопку для ручного запуска
              dicePreview.style.display = 'block';
              diceVideo.style.display = 'none';
              loadingIndicator.style.display = 'none';
              diceDisplay.classList.remove('rolling');
              isRolling = false;
              rollButton.disabled = false;
              rollButton.textContent = '👉 Нажми, чтобы посмотреть';
            });
          }
        };

        const onEnded = () => {
          cleanup();
          diceDisplay.classList.remove('rolling');
          isRolling = false;
          rollButton.disabled = false;

          // Показываем результат
          showResult(result);

          // Отправляем данные боту
          setTimeout(() => {
            tg.sendData(JSON.stringify({
              action: "dice_roll",
              dice_type: currentDiceType,
              value: result
            }));

            // Закрываем окно через 1.5 секунды
            setTimeout(() => {
              tg.close();
            }, 1500);
          }, 600);

          // Возвращаем превью через небольшую паузу
          setTimeout(() => {
            if (!isRolling) {
              diceVideo.style.display = 'none';
              dicePreview.style.display = 'block';
            }
          }, 800);

          // Предзагружаем соседние результаты для следующих бросков
          preloadNeighbors(result);
        };

        const onError = (e) => {
          console.error('❌ Ошибка загрузки видео:', videoUrl, e);
          cleanup();
          diceDisplay.classList.remove('rolling');
          loadingIndicator.style.display = 'none';
          isRolling = false;
          rollButton.disabled = false;

          // Показываем результат без видео
          showResult(result);

          // Всё равно отправляем боту
          setTimeout(() => {
            tg.sendData(JSON.stringify({
              action: "dice_roll",
              dice_type: currentDiceType,
              value: result
            }));
            setTimeout(() => tg.close(), 1500);
          }, 600);
        };

        const cleanup = () => {
          diceVideo.removeEventListener('canplay', onCanPlay);
          diceVideo.removeEventListener('ended', onEnded);
          diceVideo.removeEventListener('error', onError);
        };

        diceVideo.addEventListener('canplay', onCanPlay, { once: false });
        diceVideo.addEventListener('ended', onEnded, { once: true });
        diceVideo.addEventListener('error', onError, { once: true });

        // Начинаем загрузку
        diceVideo.load();
      }

      // ==================== ОТОБРАЖЕНИЕ РЕЗУЛЬТАТА ====================
      function showResult(value) {
        rollResult.textContent = value;

        // Цвет в зависимости от результата
        const percent = (value / currentDiceConfig.sides) * 100;
        let color;
        if (value === currentDiceConfig.sides) {
          color = '#ffd700'; // Золотой для максимального значения
          rollResult.style.textShadow = '0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4)';
        } else if (value === 1) {
          color = '#ff4444'; // Красный для критического провала
          rollResult.style.textShadow = '0 0 30px rgba(255, 68, 68, 0.8), 0 0 60px rgba(255, 68, 68, 0.4)';
        } else if (percent >= 70) {
          color = '#ffd700';
          rollResult.style.textShadow = '0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3)';
        } else {
          color = '#e0c090';
          rollResult.style.textShadow = '0 0 15px rgba(224, 192, 144, 0.5), 0 0 30px rgba(224, 192, 144, 0.2)';
        }

        rollResult.style.color = color;
        rollResult.classList.add('visible');
      }

      // ==================== УМНАЯ ПРЕДЗАГРУЗКА ====================
      function preloadNeighbors(value) {
        const sides = currentDiceConfig.sides;
        // Предзагружаем ±1 от выпавшего (если ещё не загружены)
        const neighbors = [];
        if (value > 1) neighbors.push(value - 1);
        if (value < sides) neighbors.push(value + 1);

        // Добавляем противоположное значение (часто выпадает после)
        const opposite = sides - value + 1;
        if (!neighbors.includes(opposite) && opposite !== value) {
          neighbors.push(opposite);
        }

        neighbors.forEach(val => {
          const url = getVideoUrl(val);
          if (!videoPreloaded[url]) {
            preloadVideo(url);
          }
        });
      }

      // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
      rollButton.addEventListener('click', () => {
        if (!isRolling) {
          performRoll();
        }
      });

      // Поддержка пробела для десктопа
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !isRolling) {
          e.preventDefault();
          performRoll();
        }
      });

      // ==================== ЗАПУСК ====================
      init();

      // Авто-бросок через 1 секунду (если приложение открыто из бота)
      const autoRoll = urlParams.get('auto');
      if (autoRoll !== 'false') {
        setTimeout(() => {
          if (!isRolling) {
            performRoll();
          }
        }, 1000);
      }

      console.log('🎲 Game Master готов!');
    })();
  </script>
</body>
</html>
