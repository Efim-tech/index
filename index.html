<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Master - Бросок кубика 🎲</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #0d0d0d;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("./assets/wood.jpg") no-repeat center center fixed;
      background-size: cover;
      opacity: 0.2;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 30px;
    }

    .dice-label {
      font-size: 1.2rem;
      color: #c8963e;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(200, 150, 62, 0.4);
      padding-top: 10px;
      opacity: 0.8;
    }

    .dice-stage {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
    }

    .dice-preview {
      width: 100%;
      max-width: 300px;
      max-height: 70vh;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 30px rgba(200, 150, 62, 0.25));
      border-radius: 16px;
    }

    .dice-video {
      position: absolute;
      width: 100%;
      max-width: 300px;
      max-height: 70vh;
      object-fit: contain;
      display: none;
      filter: drop-shadow(0 0 30px rgba(200, 150, 62, 0.25));
      border-radius: 16px;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      border: 3px solid rgba(200, 150, 62, 0.15);
      border-top-color: #c8963e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      z-index: 20;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .roll-btn {
      background: linear-gradient(180deg, #c8963e 0%, #7a4f1f 100%);
      border: none;
      padding: 16px 56px;
      border-radius: 50px;
      color: #fff;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .roll-btn:active {
      transform: scale(0.95);
    }

    .roll-btn:disabled {
      opacity: 0.35;
      transform: none;
    }

    @media (max-width: 360px) {
      .dice-preview, .dice-video {
        max-width: 260px;
      }
      .roll-btn {
        padding: 14px 44px;
        font-size: 1rem;
      }
    }

    @media (min-width: 420px) {
      .dice-preview, .dice-video {
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="app">
    <div class="dice-label" id="diceLabel">D20</div>

    <div class="dice-stage">
      <img
        id="dicePreview"
        class="dice-preview"
        src="./assets/previews/d20.png"
        alt="Кубик D20"
      >
      <video
        id="diceVideo"
        class="dice-video"
        playsinline
        muted
        preload="none"
        disableRemotePlayback
      ></video>
      <div class="loader" id="loader"></div>
    </div>

    <button class="roll-btn" id="rollButton">
      🎲 Бросить
    </button>
  </div>

  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.BackButton.hide();

      const DICE_CONFIG = {
        d4:  { sides: 4,  preview: './assets/previews/d4.png' },
        d6:  { sides: 6,  preview: './assets/previews/d6.png' },
        d8:  { sides: 8,  preview: './assets/previews/d8.png' },
        d10: { sides: 10, preview: './assets/previews/d10.png' },
        d12: { sides: 12, preview: './assets/previews/d12.png' },
        d20: { sides: 20, preview: './assets/previews/d20.png' }
      };

      const VIDEO_PATH = './assets/videos';

      const dicePreview = document.getElementById('dicePreview');
      const diceVideo   = document.getElementById('diceVideo');
      const loader      = document.getElementById('loader');
      const rollBtn     = document.getElementById('rollButton');
      const diceLabel   = document.getElementById('diceLabel');

      const urlParams = new URLSearchParams(window.location.search);
      const diceType = urlParams.get('dice') || 'd20';
      const config   = DICE_CONFIG[diceType] || DICE_CONFIG.d20;
      let isRolling  = false;

      diceLabel.textContent = diceType.toUpperCase();
      dicePreview.src = config.preview;

      function roll() {
        if (isRolling) return;
        isRolling = true;
        rollBtn.disabled = true;

        const result = Math.floor(Math.random() * config.sides) + 1;
        console.log(`🎲 Бросок ${diceType}: ${result}`);

        diceVideo.style.display = 'none';
        dicePreview.style.display = 'block';
        loader.style.display = 'block';

        const videoUrl = `${VIDEO_PATH}/${diceType}/${result}.mp4`;

        let finished = false;

        const onReady = () => {
          if (finished) return;
          finished = true;

          loader.style.display = 'none';
          dicePreview.style.display = 'none';
          diceVideo.style.display = 'block';
          diceVideo.play().catch(() => {});
        };

        const onEnd = () => {
          cleanup();
          isRolling = false;
          rollBtn.disabled = false;

          tg.sendData(JSON.stringify({
            action: "dice_roll",
            dice_type: diceType,
            value: result
          }));

          setTimeout(() => {
            if (!isRolling) {
              diceVideo.style.display = 'none';
              dicePreview.style.display = 'block';
            }
          }, 1000);

          setTimeout(() => {
            tg.close();
          }, 2200);
        };

        const onError = () => {
          cleanup();
          loader.style.display = 'none';
          isRolling = false;
          rollBtn.disabled = false;

          tg.sendData(JSON.stringify({
            action: "dice_roll",
            dice_type: diceType,
            value: result
          }));

          setTimeout(() => tg.close(), 2200);
        };

        const cleanup = () => {
          diceVideo.removeEventListener('canplaythrough', onReady);
          diceVideo.removeEventListener('ended', onEnd);
          diceVideo.removeEventListener('error', onError);
        };

        diceVideo.addEventListener('canplaythrough', onReady);
        diceVideo.addEventListener('ended', onEnd);
        diceVideo.addEventListener('error', onError);

        diceVideo.src = videoUrl;
        diceVideo.load();
      }

      rollBtn.addEventListener('click', roll);

      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !isRolling) {
          e.preventDefault();
          roll();
        }
      });

      const autoRoll = urlParams.get('auto');
      if (autoRoll !== 'false') {
        setTimeout(roll, 1200);
      }

      console.log(`🎲 Game Master готов. Кубик: ${diceType}, сторон: ${config.sides}`);
    })();
  </script>
</body>
</html>
