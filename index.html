<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Master - Таверна 🎲</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: url("./assets/wood.jpg") no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #f5f5dc;
      text-align: center;
      overflow-x: hidden;
    }

    .fog-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.06), transparent 70%),
                  radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.03), transparent 60%),
                  radial-gradient(circle at 20% 60%, rgba(255, 255, 255, 0.04), transparent 65%);
      animation: fogMove 20s infinite linear;
      z-index: 1;
    }

    @keyframes fogMove {
      0% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-20px, 10px);
      }
      100% {
        transform: translate(0, 0);
      }
    }

    .container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 2;
    }

    .header {
      margin-bottom: 1.5rem;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab-button {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #6b4226;
      padding: 10px 15px;
      border-radius: 20px;
      color: #f5f5dc;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
    }

    .tab-button.active {
      background: linear-gradient(45deg, #a67c52, #6b4226);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border-color: #ffd700;
    }

    .tab-button.locked {
      opacity: 0.6;
      cursor: not-allowed;
      background: rgba(0, 0, 0, 0.3) !important;
      border-color: transparent;
    }

    .tab-button.locked::after {
      content: " 🔒";
      font-size: 0.8em;
    }

    .lock-message {
      background: rgba(50, 0, 0, 0.7);
      border: 1px solid rgba(255, 0, 0, 0.5);
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 0.9rem;
      backdrop-filter: blur(2px);
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
    }

    .dice-content {
      display: none;
    }

    .dice-content.active {
      display: block;
    }

    .dice-video-container {
      width: 280px;
      height: 280px;
      margin: 1.5rem auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dice-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 24px;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
      background: transparent;
    }

    .video-placeholder {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      backdrop-filter: blur(4px);
      border: 2px dashed #a67c52;
      color: #ffd700;
      z-index: 5;
      transition: opacity 0.3s;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 215, 0, 0.3);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result-overlay {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.5rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 2px 2px 15px black, 0 0 20px gold;
      opacity: 0;
      transition: opacity 0.5s 0.3s;
      z-index: 10;
      pointer-events: none;
    }

    .auto-roll-status {
      font-size: 1.2rem;
      margin: 1.5rem 0;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }
  </style>
</head>
<body>
  <div class="fog-layer"></div>

  <div class="container">
    <div class="header">
      <h1>🍺 Dice Master</h1>
      <p>Кости на столе таверны</p>
    </div>

    <div class="tabs">
      <button class="tab-button locked" data-tab="d4">D4</button>
      <button class="tab-button locked" data-tab="d6">D6</button>
      <button class="tab-button locked" data-tab="d8">D8</button>
      <button class="tab-button locked" data-tab="d10">D10</button>
      <button class="tab-button locked" data-tab="d12">D12</button>
      <button class="tab-button locked" data-tab="d20">D20</button>
    </div>

    <div id="lockMessage" class="lock-message" style="display: none;">
      ⚠️ Этот кубик недоступен для броска. Бот выберет нужный кубик автоматически.
    </div>

    <div id="dice-contents"></div>
  </div>

  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.BackButton.hide();

      const urlParams = new URLSearchParams(window.location.search);
      const allowedDice = urlParams.get('dice') || 'd20';

      const VIDEO_BASE_PATH = './assets/videos';
      const diceTypes = ['d4', 'd6', 'd8', 'd10', 'd12', 'd20'];

      // Генерируем контейнеры
      const container = document.getElementById('dice-contents');

      diceTypes.forEach(type => {
        const div = document.createElement('div');
        div.id = `${type}-content`;
        div.className = 'dice-content';
        div.innerHTML = `
          <div class="dice-video-container">
            <div class="video-placeholder" id="${type}-placeholder">
              <div class="loader-spinner"></div>
              <span>🎲 Загрузка кубика...</span>
            </div>
            <video id="${type}-video"
                   class="dice-video"
                   playsinline
                   preload="auto"
                   style="display: none;">
            </video>
            <div class="result-overlay" id="${type}-result"></div>
          </div>
          <div class="auto-roll-status">🎯 Бросаем кубик...</div>
        `;
        container.appendChild(div);
      });

      function getVideoUrl(diceType, value) {
        return `${VIDEO_BASE_PATH}/${diceType}/${value}.mp4`;
      }

      class DiceVideoRoller {
        constructor(type) {
          this.type = type;
          this.sides = { d4: 4, d6: 6, d8: 8, d10: 10, d12: 12, d20: 20 }[type];
          this.videoElement = document.getElementById(`${type}-video`);
          this.placeholder = document.getElementById(`${type}-placeholder`);
          this.resultOverlay = document.getElementById(`${type}-result`);
          this.isRolling = false;
        }

        roll(resultValue, callback) {
          if (this.isRolling) return;
          this.isRolling = true;

          const finalResult = resultValue || Math.floor(Math.random() * this.sides) + 1;

          // Скрываем результат, показываем плейсхолдер
          this.resultOverlay.style.opacity = '0';
          this.placeholder.style.display = 'flex';
          this.videoElement.style.display = 'none';

          const videoUrl = getVideoUrl(this.type, finalResult);
          console.log(`🎲 Бросок ${this.type}, результат: ${finalResult}, видео: ${videoUrl}`);

          this.videoElement.src = videoUrl;

          const cleanup = () => {
            this.videoElement.removeEventListener('canplay', onCanPlay);
            this.videoElement.removeEventListener('ended', onEnded);
            this.videoElement.removeEventListener('error', onError);
          };

          const onCanPlay = () => {
            this.placeholder.style.display = 'none';
            this.videoElement.style.display = 'block';

            // ВАЖНО: для iOS с родным звуком видео должно запускаться
            // через явный вызов play(). Атрибут playsinline уже есть.
            this.videoElement.play().catch((e) => {
              console.warn('Автовоспроизведение заблокировано:', e);
              // Показываем подсказку или fallback, если браузер требует тап
              this.placeholder.innerHTML = '<span>👉 Нажми для броска</span>';
              this.placeholder.style.display = 'flex';
              this.placeholder.style.cursor = 'pointer';

              // По клику запускаем вручную
              const tapHandler = () => {
                this.placeholder.style.display = 'none';
                this.videoElement.style.display = 'block';
                this.videoElement.play();
                this.placeholder.removeEventListener('click', tapHandler);
              };
              this.placeholder.addEventListener('click', tapHandler);
            });
          };

          const onEnded = () => {
            cleanup();
            this.isRolling = false;
            this.showResultNumber(finalResult);

            if (callback) {
              callback(finalResult);
            }
          };

          const onError = (e) => {
            console.error(`❌ Ошибка загрузки видео: ${videoUrl}`, e);
            cleanup();
            this.isRolling = false;
            this.showFallback(finalResult);

            if (callback) {
              callback(finalResult);
            }
          };

          this.videoElement.addEventListener('canplay', onCanPlay);
          this.videoElement.addEventListener('ended', onEnded);
          this.videoElement.addEventListener('error', onError);

          this.videoElement.load();
        }

        showResultNumber(val) {
          this.resultOverlay.textContent = val;
          this.resultOverlay.style.opacity = '1';

          const percent = (val / this.sides) * 100;
          let color = '#ffd700';
          if (percent >= 80) {
            color = '#ffaa00';
          } else if (percent <= 20) {
            color = '#ff6b6b';
          }

          this.resultOverlay.style.color = color;
          this.resultOverlay.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
        }

        showFallback(val) {
          this.placeholder.style.display = 'none';
          this.videoElement.style.display = 'none';
          this.showResultNumber(val);
          console.log(`⚠️ Использую fallback-отображение для ${this.type}: ${val}`);
        }
      }

      // Создаём roller'ы
      const rollers = {};
      diceTypes.forEach(type => {
        rollers[type] = new DiceVideoRoller(type);
      });

      // UI: активация вкладок
      function activateAllowedDice(diceType) {
        document.querySelectorAll('.tab-button').forEach(btn => {
          btn.classList.add('locked');
          btn.classList.remove('active');
        });

        document.querySelectorAll('.dice-content').forEach(c => {
          c.classList.remove('active');
        });

        const btn = document.querySelector(`[data-tab="${diceType}"]`);
        const content = document.getElementById(`${diceType}-content`);

        if (btn && content) {
          btn.classList.remove('locked');
          btn.classList.add('active');
          content.classList.add('active');
          document.getElementById('lockMessage').style.display = 'none';
        }
      }

      // Блокировка чужих вкладок
      document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
          if (button.classList.contains('locked')) {
            const msg = document.getElementById('lockMessage');
            msg.style.display = 'block';
            setTimeout(() => {
              msg.style.display = 'none';
            }, 3000);
          }
        });
      });

      // Авто-бросок
      let autoRollExecuted = false;

      function autoRollDice() {
        if (autoRollExecuted) return;
        autoRollExecuted = true;

        const diceType = allowedDice;
        activateAllowedDice(diceType);

        setTimeout(() => {
          const roller = rollers[diceType];
          if (roller) {
            const result = Math.floor(Math.random() * roller.sides) + 1;

            roller.roll(result, (finalResult) => {
              setTimeout(() => {
                tg.sendData(JSON.stringify({
                  action: "dice_roll",
                  dice_type: diceType,
                  value: finalResult
                }));

                setTimeout(() => {
                  tg.close();
                }, 1500);
              }, 800);
            });
          }
        }, 2500);
      }

      // Старт
      document.addEventListener('DOMContentLoaded', () => {
        activateAllowedDice(allowedDice);
        setTimeout(autoRollDice, 1000);
      });

    })();
  </script>
</body>
</html>
